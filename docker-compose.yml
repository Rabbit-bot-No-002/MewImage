services:
  app:
    image: ${MEW_DOCKER_IMAGE}
    container_name: ${MEW_CONTAINER_NAME}
    restart: unless-stopped
    init: true
    ports:
      # 左侧是宿主机端口，右侧 3000 是镜像内部固定监听端口。
      - "${MEW_HOST_PORT}:3000"
    env_file:
      # 应用配置统一从同目录 .env 注入，Compose 文件无需修改。
      - .env
    environment:
      # 这四项是镜像内部固定路径
      MEW_LISTEN: 0.0.0.0:3000
      MEW_DATABASE_URL: sqlite:///data/mew-image.db
      MEW_FRONTEND_DIST: /app/frontend/dist-app
      MEW_LOCAL_ASSET_DIR: /data/assets
    volumes:
      - ./data:/data
    mem_limit: ${MEW_MEMORY_LIMIT}
    stop_grace_period: 30s
